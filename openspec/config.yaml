schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Tech stack, conventions, style guides, domain knowledge, etc.
# (Example)
# context: |
#   Tech stack: TypeScript, React, Node.js
#   We use conventional commits
#   Domain: e-commerce platform

# Per-artifact rules
rules:
  spec: >
    Requirements don't use EARS notation. They are as concise as possible while
    remaining human-readable and non-ambiguous. Content is grouped into
    bulleted lists rather than paragraphs

    Specs may reference other documents (like docs/lang.md) without duplicating
    their content.

  tasks: >
    Tasks do not include spec changes
